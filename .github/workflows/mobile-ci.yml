name: Android & iOS CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  android:
    name: Android build, checks & unit tests
    runs-on: ubuntu-latest

    env:
      # Used for auto-incrementing Android versionCode on CI
      CI_BUILD_NUMBER: ${{ github.run_number }}
      STORE_PASSWORD: ${{ secrets.STORE_PASSWORD }}
      KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
      KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
          cache: gradle

      - name: Grant execute permission for Gradle wrapper
        run: chmod +x gradlew

      - name: Decode keystore
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > "$RUNNER_TEMP/drivelicense.jks"
          echo "KEYSTORE_PATH=$RUNNER_TEMP/drivelicense.jks" >> "$GITHUB_ENV"

      - name: Print Android app version
        id: app_version
        run: |
          VERSION_NAME=$(grep 'versionName = ' androidApp/build.gradle.kts | awk -F'"' '{print $2}')
          echo "version_name=$VERSION_NAME" >> "$GITHUB_OUTPUT"

      - name: Build, run checks & unit tests (KMP + Android)
        run: ./gradlew clean check :androidApp:testDebugUnitTest :androidApp:assembleRelease --stacktrace

      - name: Upload Android release APK
        uses: actions/upload-artifact@v4
        with:
          # Example: android-1.0.0+42-release
          name: android-${{ steps.app_version.outputs.version_name || 'unknown' }}+${{ github.run_number }}-release
          path: androidApp/build/outputs/apk/release/*.apk

  ios:
    name: iOS build & unit tests (KMP framework + Xcode)
    needs: android
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
          cache: gradle

      - name: Grant execute permission for Gradle wrapper
        run: chmod +x gradlew

      - name: Bump iOS build number from CI run
        id: ios_version
        run: |
          /usr/libexec/PlistBuddy -c "Set :CFBundleVersion ${GITHUB_RUN_NUMBER}" "iosApp/iosApp/Info.plist"
          VERSION_NAME=$(/usr/libexec/PlistBuddy -c "Print :CFBundleShortVersionString" "iosApp/iosApp/Info.plist")
          echo "version_name=$VERSION_NAME" >> "$GITHUB_OUTPUT"

      - name: Build iOS KMP framework
        run: ./gradlew :composeApp:linkDebugFrameworkIosSimulatorArm64 --stacktrace

      - name: Xcode build & tests (adjust scheme/SDK if needed)
        run: |
          xcodebuild \
            -project iosApp/iosApp.xcodeproj \
            -scheme iosApp \
            -configuration Debug \
            -destination 'platform=iOS Simulator,name=iPhone 16 Pro' \
            -derivedDataPath iosApp/build/DerivedData \
            -testPlan DriveLicenseTestPlan \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            DEVELOPMENT_TEAM="" \
            clean build test

      - name: Upload iOS build products
        uses: actions/upload-artifact@v4
        with:
          # Example: ios-1.0+42-release
          name: ios-${{ steps.ios_version.outputs.version_name || 'unknown' }}+${{ github.run_number }}-release
          path: iosApp/build/DerivedData/Build/Products/**/*.app

