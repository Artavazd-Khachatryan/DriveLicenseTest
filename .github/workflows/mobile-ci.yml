name: Android & iOS CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  android:
    name: Android build, checks & unit tests
    runs-on: ubuntu-latest

    env:
      STORE_PASSWORD: ${{ secrets.STORE_PASSWORD }}
      KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
      KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
          cache: gradle

      - name: Grant execute permission for Gradle wrapper
        run: chmod +x gradlew

      - name: Decode keystore
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > "$RUNNER_TEMP/drivelicense.jks"
          echo "KEYSTORE_PATH=$RUNNER_TEMP/drivelicense.jks" >> "$GITHUB_ENV"

      - name: Build, run checks & unit tests (KMP + Android)
        run: ./gradlew clean check :androidApp:testDebugUnitTest :androidApp:assembleRelease --stacktrace

      - name: Upload Android release APK
        uses: actions/upload-artifact@v4
        with:
          name: android-ci-${{ github.run_number }}-release
          path: androidApp/build/outputs/apk/release/*.apk

  ios:
    name: iOS build & unit tests (KMP framework + Xcode)
    needs: android
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
          cache: gradle

      - name: Grant execute permission for Gradle wrapper
        run: chmod +x gradlew

      - name: Bump iOS build number from CI run
        id: ios_version
        run: |
          /usr/libexec/PlistBuddy -c "Set :CFBundleVersion ${GITHUB_RUN_NUMBER}" "iosApp/iosApp/Info.plist"
          VERSION_NAME=$(/usr/libexec/PlistBuddy -c "Print :CFBundleShortVersionString" "iosApp/iosApp/Info.plist")
          echo "version_name=$VERSION_NAME" >> "$GITHUB_OUTPUT"

      - name: Build iOS KMP framework
        run: ./gradlew :composeApp:linkDebugFrameworkIosSimulatorArm64 --stacktrace

      - name: Resolve iOS Simulator
        id: sim
        run: |
          UDID=$(xcrun simctl list devices available -j | python3 -c "
          import json, sys
          data = json.load(sys.stdin)
          preferred = ('iPhone 16 Pro', 'iPhone 16', 'iPhone 15 Pro', 'iPhone 15')
          runtimes = sorted(data.get('devices', {}).keys(), reverse=True)
          for name in preferred:
              for runtime in runtimes:
                  for device in data['devices'][runtime]:
                      if device.get('name') == name and device.get('isAvailable'):
                          print(device['udid'])
                          sys.exit(0)
          for runtime in runtimes:
              for device in data['devices'][runtime]:
                  if 'iPhone' in device.get('name', '') and device.get('isAvailable'):
                      print(device['udid'])
                      sys.exit(0)
          sys.exit(1)
          ")
          echo "udid=$UDID" >> "$GITHUB_OUTPUT"

      - name: Xcode build & tests
        run: |
          xcodebuild \
            -project iosApp/iosApp.xcodeproj \
            -scheme iosApp \
            -configuration Debug \
            -destination "platform=iOS Simulator,id=${{ steps.sim.outputs.udid }}" \
            -derivedDataPath iosApp/build/DerivedData \
            -testPlan DriveLicenseTestPlan \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            DEVELOPMENT_TEAM="" \
            TEAM_ID="" \
            ENABLE_DEBUG_DYLIB=NO \
            clean build test

      - name: Upload iOS build products
        uses: actions/upload-artifact@v4
        with:
          # Example: ios-1.0+42-release
          name: ios-${{ steps.ios_version.outputs.version_name || 'unknown' }}+${{ github.run_number }}-release
          path: iosApp/build/DerivedData/Build/Products/**/*.app

