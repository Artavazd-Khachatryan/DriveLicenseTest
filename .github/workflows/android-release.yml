name: Android Release (manual)

on:
  workflow_dispatch:
    inputs:
      upload_to_play:
        description: "Upload AAB to Google Play (internal track)"
        required: true
        default: "false"
        type: choice
        options:
          - "false"
          - "true"
      track:
        description: "Google Play track"
        required: true
        default: "internal"
        type: choice
        options:
          - "internal"
          - "alpha"
          - "beta"
          - "production"

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    name: Build signed AAB/APK
    runs-on: ubuntu-latest

    env:
      # Auto-increment versionCode on CI
      CI_BUILD_NUMBER: ${{ github.run_number }}
      STORE_PASSWORD: ${{ secrets.STORE_PASSWORD }}
      KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
      KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
          cache: gradle

      - name: Grant execute permission for Gradle wrapper
        run: chmod +x gradlew

      - name: Decode keystore
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > "$RUNNER_TEMP/drivelicense.jks"
          echo "KEYSTORE_PATH=$RUNNER_TEMP/drivelicense.jks" >> "$GITHUB_ENV"

      - name: Print Android app version
        id: app_version
        run: |
          VERSION_NAME=$(grep 'versionName = ' androidApp/build.gradle.kts | awk -F'"' '{print $2}')
          echo "version_name=$VERSION_NAME" >> "$GITHUB_OUTPUT"

      - name: Build signed release AAB + APK
        run: ./gradlew :androidApp:bundleRelease :androidApp:assembleRelease --stacktrace

      - name: Upload AAB artifact
        uses: actions/upload-artifact@v4
        with:
          name: android-aab-${{ steps.app_version.outputs.version_name || 'unknown' }}+${{ github.run_number }}
          path: androidApp/build/outputs/bundle/release/*.aab

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: android-apk-${{ steps.app_version.outputs.version_name || 'unknown' }}+${{ github.run_number }}
          path: androidApp/build/outputs/apk/release/*.apk

      # Optional manual upload to Google Play (recommended: use Internal testing first)
      - name: Upload to Google Play
        if: ${{ inputs.upload_to_play == 'true' }}
        uses: r0adkll/upload-google-play@v1
        with:
          serviceAccountJsonPlainText: ${{ secrets.GOOGLE_PLAY_SERVICE_ACCOUNT_JSON }}
          packageName: com.drive.license.test
          releaseFiles: androidApp/build/outputs/bundle/release/*.aab
          track: ${{ inputs.track }}
