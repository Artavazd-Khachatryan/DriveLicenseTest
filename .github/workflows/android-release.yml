name: Android Release (manual)

on:
  workflow_dispatch:
    inputs:
      upload_to_play:
        description: "Upload AAB to Google Play"
        required: true
        default: "true"
        type: choice
        options:
          - "true"
          - "false"
      track:
        description: "Google Play track"
        required: true
        default: "open"
        type: choice
        options:
          - "open"
          - "internal"
          - "closed"
          - "production"
      release_status:
        description: "Release status (use draft if the app is still a draft in Play Console)"
        required: true
        default: "completed"
        type: choice
        options:
          - "completed"
          - "draft"

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    name: Build signed AAB/APK
    runs-on: ubuntu-latest

    env:
      STORE_PASSWORD: ${{ secrets.STORE_PASSWORD }}
      KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
      KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
          cache: gradle

      - name: Grant execute permission for Gradle wrapper
        run: chmod +x gradlew scripts/print_app_version.sh scripts/version_release_artifacts.sh

      - name: Decode keystore
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > "$RUNNER_TEMP/drivelicense.jks"
          echo "KEYSTORE_PATH=$RUNNER_TEMP/drivelicense.jks" >> "$GITHUB_ENV"

      - name: Resolve build number
        id: build_number
        run: |
          # github.run_number is persisted by GitHub per workflow — no git commits needed.
          # Optional repo variable VERSION_CODE_OFFSET if you need to jump ahead (e.g. after manual uploads).
          OFFSET="${{ vars.VERSION_CODE_OFFSET }}"
          OFFSET="${OFFSET:-0}"
          BUILD_NUMBER=$((OFFSET + GITHUB_RUN_NUMBER))
          echo "CI_BUILD_NUMBER=$BUILD_NUMBER" >> "$GITHUB_ENV"
          echo "number=$BUILD_NUMBER" >> "$GITHUB_OUTPUT"
          echo "Build number: $BUILD_NUMBER (offset=$OFFSET, run=$GITHUB_RUN_NUMBER)"

      - name: Print Android app version
        id: app_version
        run: |
          VERSION_NAME=$(CI_BUILD_NUMBER="$CI_BUILD_NUMBER" ./scripts/print_app_version.sh)
          echo "version_name=$VERSION_NAME" >> "$GITHUB_OUTPUT"

      - name: Build signed release AAB + APK
        run: ./gradlew :androidApp:bundleRelease :androidApp:assembleRelease --stacktrace

      - name: Copy release artifacts with version suffix
        run: ./scripts/version_release_artifacts.sh "${{ steps.app_version.outputs.version_name }}"

      - name: Upload AAB artifact
        uses: actions/upload-artifact@v4
        with:
          name: android-aab-${{ steps.app_version.outputs.version_name || 'unknown' }}
          path: androidApp/build/outputs/bundle/release/androidApp-release-*.aab

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: android-apk-${{ steps.app_version.outputs.version_name || 'unknown' }}
          path: androidApp/build/outputs/apk/release/androidApp-release-*.apk

      - name: Upload R8 mapping artifact
        uses: actions/upload-artifact@v4
        with:
          name: android-mapping-${{ steps.app_version.outputs.version_name || 'unknown' }}
          path: androidApp/build/outputs/mapping/release/mapping.txt

      # Upload to Google Play (defaults: upload enabled, open testing track)
      - name: Verify Play upload prerequisites
        if: ${{ inputs.upload_to_play == 'true' }}
        run: |
          if [[ -z "${{ secrets.GOOGLE_PLAY_SERVICE_ACCOUNT_JSON }}" ]]; then
            echo "::error::GOOGLE_PLAY_SERVICE_ACCOUNT_JSON secret is missing or empty."
            exit 1
          fi
          AAB_DIR="androidApp/build/outputs/bundle/release"
          AAB="$AAB_DIR/androidApp-release.aab"
          if [[ ! -f "$AAB" ]]; then
            echo "::error::AAB not found at $AAB"
            ls -la "$AAB_DIR" || true
            exit 1
          fi
          ls -lh "$AAB" "$AAB_DIR"/*.aab 2>/dev/null || true

      - name: Resolve Play track
        if: ${{ inputs.upload_to_play == 'true' }}
        id: play_track
        run: |
          SELECTED="${{ inputs.track }}"
          case "$SELECTED" in
            closed) TRACK="alpha" ;;
            open) TRACK="beta" ;;
            *) TRACK="$SELECTED" ;;
          esac
          echo "name=$TRACK" >> "$GITHUB_OUTPUT"
          echo "Uploading to Play track: $TRACK (selected: $SELECTED)"

      - name: Upload to Google Play
        if: ${{ inputs.upload_to_play == 'true' }}
        uses: r0adkll/upload-google-play@v1.1.5
        with:
          serviceAccountJsonPlainText: ${{ secrets.GOOGLE_PLAY_SERVICE_ACCOUNT_JSON }}
          packageName: com.drive.license.test
          releaseFiles: androidApp/build/outputs/bundle/release/androidApp-release.aab
          mappingFile: androidApp/build/outputs/mapping/release/mapping.txt
          tracks: ${{ steps.play_track.outputs.name }}
          status: ${{ inputs.release_status }}
