<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" role="img" aria-label="Driving test app icon">
  <rect width="512" height="512" fill="#FFFFFF"/>
  <!-- Shield (subtle frame) -->
  <path fill="none" stroke="#2563EB" stroke-width="12" stroke-linejoin="round"
        d="M256 72 L360 112 L360 248 C360 328 312 388 256 416 C200 388 152 328 152 248 L152 112 Z" opacity="0.22"/>
  <!-- Steering wheel ring -->
