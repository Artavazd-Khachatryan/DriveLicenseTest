  <line x1="256" y1="124" x2="256" y2="168" stroke="#2563EB" stroke-width="16" stroke-linecap="round"/>
  <line x1="256" y1="344" x2="256" y2="388" stroke="#2563EB" stroke-width="16" stroke-linecap="round"/>
  <line x1="124" y1="256" x2="168" y2="256" stroke="#2563EB" stroke-width="16" stroke-linecap="round"/>
  <line x1="344" y1="256" x2="388" y2="256" stroke="#2563EB" stroke-width="16" stroke-linecap="round"/>
  <!-- Road checkmark inside wheel -->
  <path fill="none" stroke="#2563EB" stroke-width="22" stroke-linecap="round" stroke-linejoin="round"
